name: Sync PR to Notion Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-changelog:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Append PR to Notion Changelog
        env:
          NOTION_KEY: ${{ secrets.NOTION_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_DATE: ${{ github.event.pull_request.merged_at }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DATE="${PR_DATE:0:10}"
          SAFE_TITLE=$(echo "$PR_TITLE" | tr '"' "'" | tr '\n' ' ')

          FIRST_LINE=$(echo "$PR_BODY" | head -1)
          if echo "$FIRST_LINE" | grep -q "🎨 UX"; then
            TAG="🎨 UX"
          elif echo "$FIRST_LINE" | grep -q "🏗️ INFRA"; then
            TAG="🏗️ INFRA"
          elif echo "$FIRST_LINE" | grep -q "🧠 MINDSCAN"; then
            TAG="🧠 MINDSCAN"
          elif echo "$FIRST_LINE" | grep -q "✍️ COPY"; then
            TAG="✍️ COPY"
          else
            TAG="⚙️ DEV"
          fi

          ENTRY="${TAG} — PR #${PR_NUMBER} — ${SAFE_TITLE} (${DATE})"

          curl -s -X PATCH "https://api.notion.com/v1/blocks/33bfbd0f-4a87-81ca-865e-e77c8c4d221c/children" \
            -H "Authorization: Bearer $NOTION_KEY" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{
              \"after\": \"aa237aa4-f13f-4e7b-84a5-868dd6f9104b\",
              \"children\": [
                {
                  \"object\": \"block\",
                  \"type\": \"bulleted_list_item\",
                  \"bulleted_list_item\": {
                    \"rich_text\": [
                      {
                        \"type\": \"text\",
                        \"text\": {
                          \"content\": \"${ENTRY}\",
                          \"link\": { \"url\": \"${PR_URL}\" }
                        }
                      }
                    ]
                  }
                }
              ]
            }"
