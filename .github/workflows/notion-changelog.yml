name: Update Notion Changelog
on:
  pull_request:
    types: [closed]
    branches: [main]
jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Add PR to Notion Changelog
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_DATE="${{ github.event.pull_request.merged_at }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          curl -s -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "parent": { "database_id": "d5fdb55f-50b2-4c15-ad7c-d8fbffa12fc1" },
              "properties": {
                "Entry": { "title": [{ "text": { "content": "PR #'"$PR_NUMBER"' — '"$PR_TITLE"'" } }] },
                "Tag": { "select": { "name": "⚙️ DEV" } },
                "Chat": { "select": { "name": "Build & Technical Dev" } },
                "Status": { "status": { "name": "✅ Done" } },
                "Summary": { "rich_text": [{ "text": { "content": "'"$PR_TITLE"' — '"$PR_URL"'" } }] },
                "Date": { "date": { "start": "'"${PR_DATE:0:10}"'" } }
              }
            }'
