<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <style>
    @keyframes bt-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    .bd { fill: #3b0764; }
    .bv { fill: #7c3aed; }
    @media (prefers-color-scheme: dark) {
      .bd { fill: #a78bfa; }
      .bv { fill: #7c3aed; }
    }
    @media (prefers-reduced-motion: reduce) {
      rect { animation: none !important; }
    }
  </style>
  <!-- top-left violet -->
  <rect class="bv" x="1"  y="1"  width="21" height="21" rx="3"
        style="animation:bt-pulse 2s ease-in-out 0.0s infinite"/>
  <!-- top-right deep purple -->
  <rect class="bd" x="26" y="1"  width="21" height="21" rx="3"
        style="animation:bt-pulse 2s ease-in-out 0.5s infinite"/>
  <!-- bottom-left deep purple -->
  <rect class="bd" x="1"  y="26" width="21" height="21" rx="3"
        style="animation:bt-pulse 2s ease-in-out 1.0s infinite"/>
  <!-- bottom-right violet -->
  <rect class="bv" x="26" y="26" width="21" height="21" rx="3"
        style="animation:bt-pulse 2s ease-in-out 1.5s infinite"/>
</svg>
